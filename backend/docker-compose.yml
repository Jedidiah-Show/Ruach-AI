services:
  postgres:
    image: postgres:17

    container_name: ruach_postgres

    environment:
      POSTGRES_USER: ruach
      POSTGRES_PASSWORD: ruach_password
      POSTGRES_DB: ruach_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: